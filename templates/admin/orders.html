{% extends 'base.html' %}

{% block content %}
<div class="container">
    <table class="table table-hover">
        <thead>
            <tr>
                {% for header in headings %}
                <th scope="col">{{ header }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in data %}
                <tr>
                    {% for cell in row %}
                        <td>{{ cell }}</td>
                    {% endfor %}
                </tr>
            {% endfor %}

        </tbody>
    </table>
</div>
{% endblock %}
