{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4 fw-bold">Profilok Kezelése</h2>

<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white fw-bold">Új Admin Profil</div>
            <div class="card-body">
                <form action="/admin/users/add" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Felhasználónév</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ideiglenes Jelszó</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Profil Létrehozása</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead><tr><th>ID</th><th>Felhasználónév</th><th>Művelet</th></tr></thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td class="align-middle">{{ user.id }}</td>
                            <td class="align-middle fw-bold">{{ user.username }}</td>
                            <td class="align-middle">
                                {% if user.id != current_user.id %}
                                    <a href="/admin/users/delete/{{ user.id }}" class="btn btn-danger btn-sm" 
                                       onclick="return confirm('Törlöd ezt a profilt?')">Törlés</a>
                                {% else %}
                                    <span class="text-muted">(Te vagy)</span>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
